<h1>Dashboard</h1>

<div class="cards">
  <div class="card">
    <h3>Total de activos</h3>
    <p>{{ summary.totalAssets || 0 }}</p>
  </div>

  <div class="card">
    <h3>Total de empleados</h3>
    <p>{{ summary.totalEmployees || 0 }}</p>
  </div>

  <div class="card">
    <h3>Asignaciones activas</h3>
    <p>{{ summary.activeAssignments || 0 }}</p>
  </div>

  <div class="card">
    <h3>Valor total</h3>
    <p>{{ summary.totalAssetValue || 0 }}</p>
  </div>
</div>
